# License Manager Deployment
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: license-manager
  labels:
    app: license-manager
    app.kubernetes.io/name: fortiaigate
    app.kubernetes.io/part-of: fortiaigate-platform
    app.kubernetes.io/managed-by: helm
    component: license-manager
    version: v1
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  selector:
    matchLabels:
      app: license-manager
      component: license-manager
  template:
    metadata:
      labels:
        app: license-manager
        component: license-manager
        version: v1
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- keys .Values.global.licenses | toYaml | nindent 22 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
      - name: license-manager
        image: {{ .Values.fortiaigate.image.repository }}/license_manager:{{ .Values.fortiaigate.image.tag }}
        imagePullPolicy: {{ .Values.fortiaigate.image.pullPolicy }}
        ports:
        - containerPort: 443
          name: https
          protocol: TCP
        resources:
          {{- toYaml .Values.license_manager.resources | nindent 10 }}
        # Environment variables
        env:
        - name: FORTIAIGATE_LOG_LEVEL
          value: {{ .Values.fortiaigate.env.logLevel | quote }}
        {{- if .Values.tls.enabled }}
        - name: FORTIAIGATE_SSL_CERT_FILE
          value: {{ printf "%s/tls.crt" .Values.tls.mountPath | quote }}
        - name: FORTIAIGATE_SSL_KEY_FILE
          value: {{ printf "%s/tls.key" .Values.tls.mountPath | quote }}
        {{- end }}
        - name: REDIS_SSL_ENABLED
          value: {{ .Values.redis.tls.enabled | quote }}
        {{- if .Values.redis.tls.enabled }}
        - name: REDIS_SSL_CERTFILE
          value: {{ printf "%s/tls.crt" .Values.tls.mountPath | quote }}
        - name: REDIS_SSL_KEYFILE
          value: {{ printf "%s/tls.key" .Values.tls.mountPath | quote }}
        - name: REDIS_SSL_CA_CERTS
          value: {{ printf "%s/tls.crt" .Values.tls.mountPath | quote }}
        {{- end }}
        # Database configuration (only what's actually used by the application)
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "fortiaigate.fullname" . }}-db-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "fortiaigate.fullname" . }}-db-config
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-redis
              key: redis-password
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-license-manager
              key: license-key
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: shared-data
          mountPath: /etc/fortiaigate/
          readOnly: false
        - name: tmp
          mountPath: /tmp
        {{- if or .Values.tls.enabled .Values.redis.tls.enabled }}
        - name: tls-certs
          mountPath: {{ .Values.tls.mountPath | quote }}
          readOnly: true
        {{- end }}
        - name: license
          mountPath: /etc/licenses/
          readOnly: true
        - name: data
          mountPath: /data
      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: {{ include "fortiaigate.fullname" . }}-storage
      - name: tmp
        emptyDir: {}
      - name: data
        emptyDir:
          medium: Memory
          sizeLimit: 128Mi
      {{- if or .Values.tls.enabled .Values.redis.tls.enabled }}
      - name: tls-certs
        secret:
          secretName: fortiaigate-tls-secret
      {{- end }}
      - name: license
        configMap:
          name: {{ include "fortiaigate.fullname" . }}-license-config
      {{- with .Values.fortiaigate.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: fortiaigate-license-manager
  labels:
    app: license-manager
    app.kubernetes.io/name: fortiaigate
    app.kubernetes.io/part-of: fortiaigate-platform
    app.kubernetes.io/managed-by: helm
    component: license-manager
    version: v1
  annotations:
    "helm.sh/resource-policy": "keep"
type: Opaque
data:
  {{- $secretObj := (lookup "v1" "Secret" .Release.Namespace "fortiaigate-license-manager") | default dict }}
  {{- $secretData := (get $secretObj "data") | default dict }}
  # generate a license key if not exist
  {{- $licenseKey := (get $secretData "license-key") | default (randAlphaNum 32 | b64enc) }}
  license-key: {{ $licenseKey | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: license-manager
  labels:
    app: license-manager
    app.kubernetes.io/name: fortiaigate
    app.kubernetes.io/part-of: fortiaigate-platform
    app.kubernetes.io/managed-by: helm
    component: license-manager
    version: v1
spec:
  selector:
    app: license-manager
    component: license-manager
  ports:
  - protocol: TCP
    port: 9000
    targetPort: 9000
    name: http
  - protocol: TCP
    port: 9443
    targetPort: 9443
    name: https
  internalTrafficPolicy: Local
